version: '3.8'
services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - mongo
      - redis
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
